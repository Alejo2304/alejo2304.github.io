<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti, Mi Amor</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose: #c2607a;
    --rose-light: #f5dde4;
    --rose-pale: #fdf0f3;
    --rose-deep: #8b3a52;
    --cream: #faf7f2;
    --warm-gray: #8c7b7b;
    --text-dark: #2e1f24;
    --text-mid: #6b4f57;
    --gold: #b8956a;
    --gold-light: #f0e6d6;
  }

  html, body {
    min-height: 100vh;
    background-color: var(--cream);
    font-family: 'Jost', sans-serif;
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative corner petals */
  body::after {
    content: '';
    position: fixed;
    top: -80px;
    right: -80px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(194,96,122,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 3.5rem;
  }

  .header .eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 1rem;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.8rem, 7vw, 5rem);
    line-height: 1.05;
    color: var(--text-dark);
    letter-spacing: -0.01em;
  }

  .header h1 em {
    font-style: italic;
    color: var(--rose);
  }

  .header .subtitle {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.9rem;
    color: var(--warm-gray);
    margin-top: 1rem;
    letter-spacing: 0.05em;
  }

  /* Decorative line */
  .ornament {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 0 auto 3.5rem;
    width: fit-content;
  }
  .ornament span { color: var(--rose); font-size: 1.1rem; }
  .ornament .line {
    width: 60px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
  }

  /* Card container */
  .card-wrapper {
    width: 100%;
    max-width: 680px;
    position: relative;
  }

  /* Background card shadow effect */
  .card-wrapper::before,
  .card-wrapper::after {
    content: '';
    position: absolute;
    left: 50%;
    background: var(--rose-light);
    border-radius: 20px;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card-wrapper::before {
    width: calc(100% - 40px);
    height: 100%;
    transform: translateX(-50%) translateY(16px);
    opacity: 0.5;
    z-index: -2;
  }
  .card-wrapper::after {
    width: calc(100% - 20px);
    height: 100%;
    transform: translateX(-50%) translateY(8px);
    opacity: 0.7;
    z-index: -1;
  }
  .card-wrapper:hover::before { transform: translateX(-50%) translateY(20px); }
  .card-wrapper:hover::after { transform: translateX(-50%) translateY(12px); }

  /* Main card */
  .card {
    background: white;
    border-radius: 20px;
    padding: clamp(2.5rem, 6vw, 4.5rem) clamp(2rem, 6vw, 4rem);
    border: 0.5px solid rgba(194,96,122,0.2);
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }

  /* Card corner decorations */
  .card::before {
    content: '❧';
    position: absolute;
    top: 1.2rem;
    left: 1.5rem;
    font-size: 1.2rem;
    color: var(--rose-light);
    opacity: 0.8;
  }
  .card::after {
    content: '❧';
    position: absolute;
    bottom: 1.2rem;
    right: 1.5rem;
    font-size: 1.2rem;
    color: var(--rose-light);
    opacity: 0.8;
    transform: rotate(180deg);
  }

  /* Phrase display */
  .phrase-area {
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phrase-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(1.3rem, 3.5vw, 1.85rem);
    line-height: 1.55;
    color: var(--text-dark);
    letter-spacing: 0.01em;
    max-width: 540px;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .phrase-text.hidden {
    opacity: 0;
    transform: translateY(8px);
  }

  .phrase-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Counter */
  .counter {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--rose);
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* Button */
  .btn-wrap {
    margin-top: 0.5rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--rose);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 0.9rem 2.2rem;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    box-shadow: 0 4px 24px rgba(194,96,122,0.3);
  }

  .btn:hover {
    background: var(--rose-deep);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(194,96,122,0.35);
  }

  .btn:active {
    transform: translateY(0px) scale(0.98);
  }

  .btn svg {
    width: 16px;
    height: 16px;
    transition: transform 0.4s ease;
  }

  .btn:hover svg {
    transform: rotate(20deg);
  }

  /* Floating hearts */
  .heart-float {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    opacity: 0;
    z-index: 999;
    animation: floatUp 2s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 0.8; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.5) rotate(20deg); }
  }

  /* Footer */
  .footer {
    margin-top: 3.5rem;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--warm-gray);
    opacity: 0.7;
  }

  /* Bottom decoration */
  .bottom-glow {
    position: fixed;
    bottom: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(194,96,122,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="wrapper">
  <header class="header">
    <p class="eyebrow">Una colección para ti</p>
    <h1>Con todo<br>mi <em>amor</em></h1>

  </header>

  <div class="ornament">

  </div>

  <div class="card-wrapper">
    <div class="card">
      <div class="phrase-area">

      </div>
      <p class="counter" id="counter"></p>
      <div class="btn-wrap">

          Recibir amor

    </div>

    Hecho con todo mi amor, para ti — siempre
  </footer>
</div>

<div class="bottom-glow"></div>

let usedIndices = [];
let currentIndex = -1;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let shuffledIndices = shuffle([...Array(phrases.length).keys()]);
let pointer = 0;

function nextPhrase() {
  const el = document.getElementById('phrase');
  const counter = document.getElementById('counter');

  // Float hearts
  spawnHearts();

  el.classList.remove('visible');
  el.classList.add('hidden');

  setTimeout(() => {
    if (pointer >= shuffledIndices.length) {
      shuffledIndices = shuffle([...Array(phrases.length).keys()]);
      pointer = 0;
    }
    currentIndex = shuffledIndices[pointer++];
    el.textContent = phrases[currentIndex];
    counter.textContent = `${pointer} de ${phrases.length} frases`;
    el.classList.remove('hidden');
    el.classList.add('visible');
  }, 480);
}

function spawnHearts() {
  const btn = document.getElementById('mainBtn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const hearts = ['♡', '♡', '♡', '❤', '♡'];

  hearts.forEach((h, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart-float';
      el.textContent = h;
      el.style.left = (cx + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = cy + 'px';
      el.style.color = `hsl(${340 + Math.random() * 20}, 70%, ${55 + Math.random() * 15}%)`;
      el.style.fontSize = (0.9 + Math.random() * 0.6) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2100);
    }, i * 80);
  });
}
